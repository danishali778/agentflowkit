name: Docs Validation

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "docs/**"

jobs:
  validate-doc-layout:
    name: Validate public docs layout
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure key documentation files exist
        run: |
          python - <<'PY'
          from pathlib import Path

          expected = [
              "README.md",
              "docs/README.md",
              "docs/current-status.md",
              "docs/architecture/README.md",
              "docs/architecture/overview.md",
              "docs/architecture/runtime.md",
              "docs/architecture/api.md",
              "docs/guides/README.md",
              "docs/guides/first-workflow.md",
              "docs/guides/retries-and-failures.md",
              "docs/guides/inspecting-results.md",
              "docs/guides/branching-workflows.md",
              "docs/guides/human-approval.md",
          ]

          missing = [path for path in expected if not Path(path).exists()]
          if missing:
              raise SystemExit(f"Missing documented files: {missing}")
          PY
